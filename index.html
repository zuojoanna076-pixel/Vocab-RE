<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>单词乐园 · Unit 1A 足球世界</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Segoe UI",sans-serif;
  color:#2b2240;
  min-height:100vh;
  padding:14px 12px 60px;
  background:linear-gradient(135deg,#ffe3ec 0%,#e3f0ff 35%,#e6fff4 70%,#fff7d6 100%);
  background-attachment:fixed;
}
.page{max-width:640px;margin:0 auto}

/* ---------- Header ---------- */
.hd{text-align:center;margin-bottom:14px}
.hd h1{font-size:24px;font-weight:900;letter-spacing:.5px;
  background:linear-gradient(90deg,#ff6b6b,#ffa634,#42c98b,#3aafe0,#9b5de5);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hd p{font-size:13px;color:#7a6f93;margin-top:4px;font-weight:600}

/* ---------- Mode tabs ---------- */
.modes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}
.mode-btn{
  border:none;cursor:pointer;font-weight:800;font-size:13px;color:#fff;
  padding:9px 14px;border-radius:18px;
  box-shadow:0 4px 0 rgba(0,0,0,.12);
  transition:transform .1s,box-shadow .1s,filter .15s;
  filter:saturate(.55) brightness(1.04);
}
.mode-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.12)}
.mode-btn.active{filter:none;transform:translateY(-1px) scale(1.04)}
.m0{background:#ff6b6b}.m1{background:#ffa634}.m2{background:#42c98b}
.m3{background:#3aafe0}.m4{background:#9b5de5}.m5{background:#f15bb5}

/* ---------- Toolbar ---------- */
.bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.chip{
  border:none;cursor:pointer;font-weight:700;font-size:12px;color:#5b4d77;
  background:#fff;padding:7px 13px;border-radius:14px;
  box-shadow:0 3px 0 rgba(155,93,229,.18);transition:transform .1s,box-shadow .1s;
}
.chip:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(155,93,229,.18)}
.unit-btn.active{background:#9b5de5;color:#fff;box-shadow:0 3px 0 #7a44c0}

/* ---------- Progress + stats ---------- */
.meta{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.pbar{flex:1;height:12px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.08)}
.pfill{height:100%;width:0;border-radius:10px;
  background:linear-gradient(90deg,#42c98b,#3aafe0);transition:width .35s}
.stat{font-size:13px;font-weight:800;white-space:nowrap}
.stat .ok{color:#16a34a}.stat .no{color:#ef4444}

/* ---------- Card stage ---------- */
.stage{min-height:300px}
.card{
  background:#fff;border-radius:26px;padding:26px 22px;
  box-shadow:0 10px 30px rgba(120,90,200,.18);
  text-align:center;position:relative;overflow:hidden;
  animation:pop .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
.card::before{content:"";position:absolute;top:-40px;right:-40px;width:120px;height:120px;
  border-radius:50%;background:rgba(255,166,52,.14)}
.card::after{content:"";position:absolute;bottom:-50px;left:-30px;width:140px;height:140px;
  border-radius:50%;background:rgba(58,175,224,.12)}

.word{font-size:38px;font-weight:900;color:#2b2240;position:relative;z-index:1;word-break:break-word}
.cefr{display:inline-block;font-size:11px;font-weight:800;color:#fff;background:#ffa634;
  padding:3px 10px;border-radius:10px;margin-top:8px;position:relative;z-index:1}
.zh{font-size:26px;font-weight:800;color:#9b5de5;position:relative;z-index:1}
.endef{font-size:15px;color:#6b5f85;line-height:1.5;margin-top:12px;position:relative;z-index:1}
.hint{font-size:13px;color:#a99fc0;margin-top:14px;position:relative;z-index:1;font-weight:600}
.divider{height:1px;background:#eee;margin:16px 0;position:relative;z-index:1}

/* ---------- Option buttons ---------- */
.opts{display:flex;flex-direction:column;gap:10px;margin-top:18px;position:relative;z-index:1}
.opt{
  border:none;cursor:pointer;font-size:17px;font-weight:700;color:#3a2f55;
  background:#f3eeff;padding:14px;border-radius:16px;transition:transform .1s,background .15s;
  box-shadow:0 3px 0 rgba(155,93,229,.15);
}
.opt:active{transform:translateY(2px)}
.opt.correct{background:#42c98b;color:#fff;box-shadow:0 3px 0 #2e9e69}
.opt.wrong{background:#ff6b6b;color:#fff;box-shadow:0 3px 0 #d94c4c}
.opt:disabled{cursor:default}

/* ---------- Spelling input ---------- */
.inp{width:100%;font-size:22px;font-weight:800;text-align:center;color:#2b2240;
  border:3px solid #e3d8ff;border-radius:16px;padding:14px;outline:none;margin-top:16px;
  position:relative;z-index:1}
.inp:focus{border-color:#9b5de5}

/* ---------- Action buttons ---------- */
.acts{display:flex;gap:10px;justify-content:center;margin-top:18px;position:relative;z-index:1;flex-wrap:wrap}
.btn{border:none;cursor:pointer;font-size:15px;font-weight:800;color:#fff;
  padding:12px 20px;border-radius:16px;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translateY(3px)}
.btn.primary{background:#42c98b;box-shadow:0 4px 0 #2e9e69}
.btn.primary:active{box-shadow:0 1px 0 #2e9e69}
.btn.warn{background:#ff6b6b;box-shadow:0 4px 0 #d94c4c}
.btn.warn:active{box-shadow:0 1px 0 #d94c4c}
.btn.ghost{background:#cdbff0;color:#5b4d77;box-shadow:0 4px 0 #b3a0e0}
.btn.ghost:active{box-shadow:0 1px 0 #b3a0e0}

.feedback{font-size:18px;font-weight:800;margin-top:14px;min-height:24px;position:relative;z-index:1}
.feedback.ok{color:#16a34a}.feedback.no{color:#ef4444}

/* ---------- Matching mode ---------- */
.match-wrap{display:flex;gap:54px;position:relative}
.match-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1}
.match-col{flex:1;display:flex;flex-direction:column;gap:12px;position:relative;z-index:2}
.match-item{
  border:none;cursor:pointer;font-size:15px;font-weight:700;
  padding:14px 8px;border-radius:14px;background:#fff;color:#3a2f55;
  box-shadow:0 3px 0 rgba(120,90,200,.15);transition:transform .1s,outline .1s;min-height:52px;
}
.match-item:active{transform:scale(.97)}
.match-item.sel{outline:3px solid #ffa634;transform:scale(1.03)}
.match-item.done{opacity:.6}
.match-item.matched{pointer-events:none}
.match-shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.mc0{border-left:6px solid #ff6b6b}.mc1{border-left:6px solid #ffa634}
.mc2{border-left:6px solid #42c98b}.mc3{border-left:6px solid #3aafe0}
.mc4{border-left:6px solid #9b5de5}.mc5{border-left:6px solid #f15bb5}

/* ---------- Cloze ---------- */
.cloze{font-size:17px;line-height:1.7;color:#3a2f55;background:#fff;border-radius:18px;
  padding:18px;box-shadow:0 6px 18px rgba(120,90,200,.12);position:relative;z-index:1;text-align:left}
.blank{display:inline-block;min-width:70px;border-bottom:3px solid #9b5de5;color:#9b5de5;font-weight:800;text-align:center}
.blank.filled{border-bottom-color:#42c98b;color:#16a34a}

/* ---------- Finish screen ---------- */
.finish{text-align:center;background:#fff;border-radius:26px;padding:34px 22px;
  box-shadow:0 12px 34px rgba(120,90,200,.2);animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
.finish .emoji{font-size:60px}
.finish h2{font-size:26px;font-weight:900;margin:8px 0;color:#2b2240}
.finish .pct{font-size:48px;font-weight:900;
  background:linear-gradient(90deg,#ff6b6b,#ffa634,#42c98b);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.finish p{color:#7a6f93;font-weight:600;margin:10px 0 18px}

/* ---------- Confetti ---------- */
.confetti{position:fixed;top:-10px;width:10px;height:14px;z-index:99;border-radius:2px;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ---------- Branding ---------- */
.hd-logo{width:46px;height:46px;border-radius:12px;vertical-align:middle;margin-right:8px;box-shadow:0 3px 8px rgba(0,0,0,.12)}
.brand{margin-top:26px;background:#ffe14d;border-radius:24px;padding:20px 18px;
  box-shadow:0 8px 22px rgba(200,170,40,.28);display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;text-align:center}
.brand-logo{width:72px;height:72px;border-radius:16px;box-shadow:0 3px 10px rgba(0,0,0,.18);flex:0 0 auto}
.brand-info{display:flex;flex-direction:column;align-items:center;gap:4px}
.brand-info .bn{font-size:17px;font-weight:900;color:#1a1a18;letter-spacing:.5px}
.brand-info .bs{font-size:13px;font-weight:700;color:#5a4d1a}
.brand-wx{display:inline-flex;align-items:center;gap:6px;background:#1a1a18;color:#ffe14d;
  font-size:13px;font-weight:800;padding:6px 12px;border-radius:12px;margin-top:4px}
.brand-qr{flex:0 0 auto;width:92px;height:92px;border-radius:14px;background:#fff8d6;
  border:2px dashed #c9a92a;display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:11px;font-weight:700;color:#a98c1f;line-height:1.4;padding:6px}
.brand-qr img{width:100%;height:100%;object-fit:contain;border-radius:12px}

</style>
</head>

/* ============ helpers ============ */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function pool(){var r=[];for(var i=0;i<DATA.length;i++){if(activeUnits[DATA[i].u])r.push(DATA[i])}return r}

function buildDeck(){deck=shuffle(pool().slice());idx=0;correct=0;wrong=0;matchProgress=0;matchDoneCount=0;render()}
function shuffleDeck(){deck=shuffle(deck.slice());idx=0;matchProgress=0;matchDoneCount=0;render()}
function restart(){idx=0;correct=0;wrong=0;matchProgress=0;matchDoneCount=0;render()}

function setStats(){
  document.getElementById("okN").textContent=correct;
  document.getElementById("noN").textContent=wrong;
  var total = (mode===4) ? deck.length : deck.length;
  var done = (mode===4) ? (matchProgress+matchDoneCount) : idx;
  var pct = total? Math.min(100,Math.round(done/total*100)) : 0;
  document.getElementById("pfill").style.width=pct+"%";
}

function confetti(){
  var colors=["#ff6b6b","#ffa634","#42c98b","#3aafe0","#9b5de5","#f15bb5"];
  for(var i=0;i<18;i++){(function(){
    var c=document.createElement("div");c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animation="fall "+(1+Math.random())+"s linear forwards";
    document.body.appendChild(c);
    setTimeout(function(){c.remove()},1800);
  })()}
}

function distractors(field,answer,n){
  var p=pool().slice(),out=[],used={};used[answer]=1;shuffle(p);
  for(var i=0;i<p.length&&out.length<n;i++){var v=p[i][field];if(!used[v]){used[v]=1;out.push(v)}}
  return out;
}

/* ============ MODE 0: flashcard ============ */
var flipped=false;
function renderFlash(){
  if(idx>=deck.length){return finish()}
  var w=deck[idx];flipped=false;
  var st=document.getElementById("stage");
  st.innerHTML=
   '<div class="card">'+
     '<div class="word">'+esc(w.w)+'</div>'+
     '<span class="cefr">'+esc(w.cefr)+' · '+esc(w.u)+'</span>'+
     '<div id="back" style="display:none">'+
       '<div class="divider"></div>'+
       '<div class="zh">'+esc(w.zh)+'</div>'+
       '<div class="endef">'+esc(w.def)+'</div>'+
     '</div>'+
     '<div class="hint" id="flipHint">👆 点击卡片看意思</div>'+
     '<div class="acts" id="flashActs" style="display:none">'+
       '<button class="btn warn" onclick="markFlash(false)">还不熟 😅</button>'+
       '<button class="btn primary" onclick="markFlash(true)">记住啦 🎉</button>'+
     '</div>'+
   '</div>';
  st.querySelector(".card").onclick=function(e){
    if(e.target.tagName==="BUTTON")return;
    if(!flipped){flipped=true;
      document.getElementById("back").style.display="block";
      document.getElementById("flipHint").style.display="none";
      document.getElementById("flashActs").style.display="flex";
    }
  };
  setStats();
}
function markFlash(ok){if(ok)correct++;else wrong++;idx++;render()}

/* ============ MODE 1: 中英互查 (bidirectional) ============ */
function renderBidir(){
  if(idx>=deck.length){return finish()}
  var w=deck[idx];
  var st=document.getElementById("stage");
  var front = dir===0 ? esc(w.w) : esc(w.zh);
  var frontCls = dir===0 ? "word" : "zh";
  var back = dir===0 ? '<div class="zh">'+esc(w.zh)+'</div><div class="endef">'+esc(w.def)+'</div>'
                     : '<div class="word">'+esc(w.w)+'</div><div class="endef">'+esc(w.def)+'</div>';
  st.innerHTML=
   '<div class="acts" style="margin:0 0 12px"><button class="chip" onclick="dir=1-dir;render()">🔁 当前：'+(dir===0?"英 → 中":"中 → 英")+'（点击切换）</button></div>'+
   '<div class="card">'+
     '<div class="'+frontCls+'">'+front+'</div>'+
     '<span class="cefr">'+esc(w.cefr)+'</span>'+
     '<div id="back" style="display:none"><div class="divider"></div>'+back+'</div>'+
     '<div class="hint" id="flipHint">👆 点击查看答案</div>'+
     '<div class="acts" id="acts2" style="display:none">'+
       '<button class="btn ghost" onclick="idx++;render()">下一个 ➡️</button>'+
     '</div>'+
   '</div>';
  st.querySelector(".card").onclick=function(e){
    if(e.target.tagName==="BUTTON")return;
    document.getElementById("back").style.display="block";
    document.getElementById("flipHint").style.display="none";
    document.getElementById("acts2").style.display="flex";
  };
  setStats();
}

/* ============ MODE 2: 英文定义 → 单词 ============ */
function renderDef(){
  if(idx>=deck.length){return finish()}
  var w=deck[idx];
  var opts=distractors("w",w.w,3);opts.push(w.w);shuffle(opts);
  var st=document.getElementById("stage");
  var html='<div class="card"><div class="hint" style="margin-top:0">读英文解释，选出正确单词</div>'+
    '<div class="endef" style="font-size:18px;color:#3a2f55;margin-top:10px">“'+esc(w.def)+'”</div>'+
    '<span class="cefr">'+esc(w.cefr)+'</span>'+
    '<div class="opts" id="opts"></div>'+
    '<div class="feedback" id="fb"></div></div>';
  st.innerHTML=html;
  var box=document.getElementById("opts");
  for(var i=0;i<opts.length;i++){(function(o){
    var b=document.createElement("button");b.className="opt";b.textContent=o;
    b.onclick=function(){choose(b,o,w.w,box)};box.appendChild(b);
  })(opts[i])}
  setStats();
}
function choose(btn,picked,answer,box){
  var bs=box.querySelectorAll(".opt");for(var i=0;i<bs.length;i++)bs[i].disabled=true;
  var fb=document.getElementById("fb");
  if(picked===answer){btn.className="opt correct";fb.textContent="✅ 太棒了！";fb.className="feedback ok";correct++;confetti();
    setTimeout(function(){idx++;render()},900);
  }else{btn.className="opt wrong";
    for(var j=0;j<bs.length;j++){if(bs[j].textContent===answer)bs[j].className="opt correct"}
    fb.textContent="正确答案："+answer;fb.className="feedback no";wrong++;
    setTimeout(function(){idx++;render()},1600);
  }
}

/* ============ MODE 3: 拼写 ============ */
function renderType(){
  if(idx>=deck.length){return finish()}
  var w=deck[idx];
  var st=document.getElementById("stage");
  st.innerHTML='<div class="card">'+
    '<div class="zh">'+esc(w.zh)+'</div>'+
    '<div class="endef">'+esc(w.def)+'</div>'+
    '<span class="cefr">'+esc(w.cefr)+'</span>'+
    '<input class="inp" id="typeIn" placeholder="输入英文单词…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">'+
    '<div class="acts">'+
      '<button class="btn ghost" onclick="idx++;render()">跳过</button>'+
      '<button class="btn primary" onclick="checkType()">确认 ✔️</button>'+
    '</div>'+
    '<div class="feedback" id="fb"></div></div>';
  var inp=document.getElementById("typeIn");
  inp.onkeydown=function(e){if(e.key==="Enter")checkType()};
  setTimeout(function(){inp.focus()},60);
  setStats();
}
function checkType(){
  var w=deck[idx];var inp=document.getElementById("typeIn");var fb=document.getElementById("fb");
  if(!inp||inp.disabled)return;
  var val=inp.value.trim().toLowerCase();
  if(!val)return;
  inp.disabled=true;
  if(val===w.w.toLowerCase()){fb.textContent="✅ 拼写正确！";fb.className="feedback ok";correct++;confetti();
    setTimeout(function(){idx++;render()},900);
  }else{fb.innerHTML="正确拼写：<strong>"+esc(w.w)+"</strong>";fb.className="feedback no";wrong++;
    setTimeout(function(){idx++;render()},1700);
  }
}

/* ============ MODE 4: 连线配对 ============ */
var matchProgress=0, matchBatch=[], matchSel=null, matchDoneCount=0;
var lineColors=["#ff6b6b","#ffa634","#42c98b","#3aafe0","#9b5de5","#f15bb5"];
function renderMatch(){
  if(matchProgress>=deck.length){return finish()}
  matchBatch=deck.slice(matchProgress,matchProgress+5);
  matchSel=null;matchDoneCount=0;
  var lefts=shuffle(matchBatch.slice());
  var rights=shuffle(matchBatch.slice());
  var st=document.getElementById("stage");
  var html='<div class="hint" style="text-align:center;margin-bottom:12px">点左边单词，再点右边的意思，连成一条线 ✨</div>'+
    '<div class="match-wrap" id="matchWrap"><svg class="match-svg" id="matchSvg"></svg>'+
    '<div class="match-col" id="colL">';
  for(var i=0;i<lefts.length;i++){html+='<button class="match-item mc'+(i%6)+'" data-w="'+esc(lefts[i].w)+'">'+esc(lefts[i].w)+'</button>'}
  html+='</div><div class="match-col" id="colR">';
  for(var j=0;j<rights.length;j++){html+='<button class="match-item" data-w="'+esc(rights[j].w)+'">'+esc(rights[j].zh)+'</button>'}
  html+='</div></div>';
  st.innerHTML=html;
  var L=document.querySelectorAll("#colL .match-item");
  var R=document.querySelectorAll("#colR .match-item");
  for(var a=0;a<L.length;a++)L[a].onclick=function(){pickLeft(this)};
  for(var b=0;b<R.length;b++)R[b].onclick=function(){pickRight(this)};
  setStats();
}
function pickLeft(el){
  if(el.classList.contains("matched"))return;
  var sels=document.querySelectorAll("#colL .sel");for(var i=0;i<sels.length;i++)sels[i].classList.remove("sel");
  el.classList.add("sel");matchSel=el;
}
function drawLine(elL,elR,color){
  var wrap=document.getElementById("matchWrap");var svg=document.getElementById("matchSvg");
  if(!wrap||!svg)return;
  var ns="http://www.w3.org/2000/svg";
  var wr=wrap.getBoundingClientRect();var a=elL.getBoundingClientRect();var b=elR.getBoundingClientRect();
  var x1=a.right-wr.left,y1=a.top+a.height/2-wr.top,x2=b.left-wr.left,y2=b.top+b.height/2-wr.top;
  var ln=document.createElementNS(ns,"line");
  ln.setAttribute("x1",x1);ln.setAttribute("y1",y1);ln.setAttribute("x2",x2);ln.setAttribute("y2",y2);
  ln.setAttribute("stroke",color);ln.setAttribute("stroke-width","4");ln.setAttribute("stroke-linecap","round");
  svg.appendChild(ln);
  var c1=document.createElementNS(ns,"circle");c1.setAttribute("cx",x1);c1.setAttribute("cy",y1);c1.setAttribute("r","5");c1.setAttribute("fill",color);svg.appendChild(c1);
  var c2=document.createElementNS(ns,"circle");c2.setAttribute("cx",x2);c2.setAttribute("cy",y2);c2.setAttribute("r","5");c2.setAttribute("fill",color);svg.appendChild(c2);
}
function pickRight(el){
  if(!matchSel||el.classList.contains("matched"))return;
  var wL=matchSel.getAttribute("data-w");var wR=el.getAttribute("data-w");
  if(wL===wR){
    drawLine(matchSel,el,lineColors[matchDoneCount%lineColors.length]);
    matchSel.classList.add("done","matched");el.classList.add("done","matched");
    matchSel.classList.remove("sel");matchSel=null;correct++;matchDoneCount++;confetti();
    setStats();
    if(matchDoneCount>=matchBatch.length){
      matchProgress+=matchBatch.length;
      setTimeout(function(){renderMatch()},850);
    }
  }else{
    wrong++;var s=matchSel;
    s.classList.add("match-shake");el.classList.add("match-shake");
    setTimeout(function(){s.classList.remove("match-shake","sel");el.classList.remove("match-shake")},420);
    matchSel=null;setStats();
  }
}

/* ============ MODE 5: 课文填空 ============ */
function renderCloze(){
  if(idx>=deck.length){return finish()}
  var w=deck[idx];
  // build sentence with blank (case-insensitive, word boundary)
  var re=new RegExp("\\b"+w.w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
  var sentHtml=esc(w.sent).replace(re,'<span class="blank" id="bl">______</span>');
  if(sentHtml.indexOf('class="blank"')<0){ // fallback if no match
    sentHtml=esc(w.sent)+' <span class="blank" id="bl">______</span>';
  }
  var opts=distractors("w",w.w,3);opts.push(w.w);shuffle(opts);
  var st=document.getElementById("stage");
  st.innerHTML='<div class="card"><div class="hint" style="margin-top:0">读句子，选出空格里的单词</div>'+
    '<span class="cefr">'+esc(w.u)+'</span>'+
    '<div class="cloze">'+sentHtml+'</div>'+
    '<div class="endef">提示：'+esc(w.zh)+'</div>'+
    '<div class="opts" id="opts"></div>'+
    '<div class="feedback" id="fb"></div></div>';
  var box=document.getElementById("opts");
  for(var i=0;i<opts.length;i++){(function(o){
    var b=document.createElement("button");b.className="opt";b.textContent=o;
    b.onclick=function(){chooseCloze(b,o,w.w,box)};box.appendChild(b);
  })(opts[i])}
  setStats();
}
function chooseCloze(btn,picked,answer,box){
  var bs=box.querySelectorAll(".opt");for(var i=0;i<bs.length;i++)bs[i].disabled=true;
  var fb=document.getElementById("fb");var bl=document.getElementById("bl");
  if(picked===answer){btn.className="opt correct";if(bl){bl.textContent=answer;bl.className="blank filled"}
    fb.textContent="✅ 完全正确！";fb.className="feedback ok";correct++;confetti();
    setTimeout(function(){idx++;render()},1100);
  }else{btn.className="opt wrong";
    for(var j=0;j<bs.length;j++){if(bs[j].textContent===answer)bs[j].className="opt correct"}
    if(bl){bl.textContent=answer;bl.className="blank filled"}
    fb.textContent="正确答案："+answer;fb.className="feedback no";wrong++;
    setTimeout(function(){idx++;render()},1800);
  }
}

/* ============ FINISH ============ */
function finish(){
  var total=correct+wrong;var pct=total?Math.round(correct/total*100):0;
  var emoji=pct>=90?"🏆":pct>=70?"🎉":pct>=50?"💪":"🌱";
  var msg=pct>=90?"满分级表现，你就是单词冠军！":
          pct>=70?"很棒！再练一轮就更稳啦～":
          pct>=50?"进步中！换个模式再来一遍吧。":
          "别灰心，先用闪卡熟悉一下再来挑战！";
  document.getElementById("pfill").style.width="100%";
  document.getElementById("stage").innerHTML=
   '<div class="finish"><div class="emoji">'+emoji+'</div>'+
   '<h2>本轮完成！</h2><div class="pct">'+pct+'%</div>'+
   '<p>答对 '+correct+' 个 · 答错 '+wrong+' 个<br>'+msg+'</p>'+
   '<div class="acts"><button class="btn primary" onclick="restart()">再来一轮 🔁</button></div></div>';
  if(pct>=70)confetti();
}

/* ============ ROUTER ============ */
function render(){
  if(mode===0)renderFlash();
  else if(mode===1)renderBidir();
  else if(mode===2)renderDef();
  else if(mode===3)renderType();
  else if(mode===4)renderMatch();
  else if(mode===5)renderCloze();
}

/* ============ BUILD UI ============ */
(function(){
  var mb=document.getElementById("modes");
  for(var i=0;i<MODES.length;i++){(function(i){
    var b=document.createElement("button");
    b.className="mode-btn m"+i+(i===0?" active":"");
    b.textContent=MODES[i];
    b.onclick=function(){
      mode=i;
      var all=mb.querySelectorAll(".mode-btn");for(var k=0;k<all.length;k++)all[k].classList.remove("active");
      b.classList.add("active");
      buildDeck();
    };
    mb.appendChild(b);
  })(i)}

  var ub=document.getElementById("unitBar");
  if(UNITS.length>1){
    var allB=document.createElement("button");allB.className="chip unit-btn active";allB.textContent="全部";
    allB.onclick=function(){for(var u in activeUnits)activeUnits[u]=true;refreshUnitBtns();buildDeck()};
    ub.appendChild(allB);allB.id="ubAll";
    for(var i=0;i<UNITS.length;i++){(function(u){
      var b=document.createElement("button");b.className="chip unit-btn active";b.setAttribute("data-u",u);b.textContent="Unit "+u;
      b.onclick=function(){activeUnits[u]=!activeUnits[u];b.classList.toggle("active",activeUnits[u]);
        var allOn=true;for(var k=0;k<UNITS.length;k++){if(!activeUnits[UNITS[k]])allOn=false}
        document.getElementById("ubAll").classList.toggle("active",allOn);buildDeck()};
      ub.appendChild(b);
    })(UNITS[i])}
  }
  function refreshUnitBtns(){var bs=ub.querySelectorAll(".unit-btn");for(var i=0;i<bs.length;i++)bs[i].classList.add("active")}
  buildDeck();
})();
</script>
